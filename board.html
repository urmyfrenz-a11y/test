<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방명록 · My Blog</title>
  <meta name="description" content="자유롭게 한마디 남겨주세요">
  <!-- 테마 깜빡임(FOUC) 방지: 렌더 전에 테마 적용 -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-left">
        <a class="site-title" href="index.html">My Blog</a>
        <nav class="site-nav">
          <a href="index.html">글</a>
          <a href="board.html" aria-current="page">방명록</a>
        </nav>
      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환">
        <span class="theme-toggle__icon" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">방명록</h1>
    <p class="board-intro">자유롭게 한마디 남겨주세요. 누구나 작성할 수 있습니다.</p>

    <form id="guestbook-form" class="gb-form">
      <div class="gb-form__row">
        <input id="gb-name" class="gb-input" type="text" name="name"
               placeholder="이름" maxlength="40" required autocomplete="off">
      </div>
      <div class="gb-form__row">
        <textarea id="gb-message" class="gb-textarea" name="message"
                  placeholder="내용을 입력하세요" maxlength="1000" rows="3" required></textarea>
      </div>
      <div class="gb-form__actions">
        <span id="gb-status" class="gb-status" role="status" aria-live="polite"></span>
        <button id="gb-submit" class="gb-submit" type="submit">남기기</button>
      </div>
    </form>

    <ul id="gb-list" class="gb-list">
      <li class="gb-list__loading">불러오는 중…</li>
    </ul>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> My Blog · 마크다운으로 작성</p>
    </div>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/config.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
