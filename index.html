<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <meta name="description" content="마크다운으로 쓰는 깔끔한 블로그">
  <!-- 테마 깜빡임(FOUC) 방지: 렌더 전에 테마 적용 -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-left">
        <a class="site-title" href="index.html">My Blog</a>
        <nav class="site-nav">
          <a href="index.html" aria-current="page">글</a>
          <a href="board.html">방명록</a>
        </nav>
      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환">
        <span class="theme-toggle__icon" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">글 목록</h1>
    <ul id="post-list" class="post-list">
      <li class="post-list__loading">불러오는 중…</li>
    </ul>

    <section class="notice-section" aria-labelledby="notice-heading">
      <h2 id="notice-heading" class="notice-section__title">공지사항</h2>
      <ul id="notice-list" class="notice-list">
        <li class="notice-list__loading">불러오는 중…</li>
      </ul>
      <nav id="notice-pager" class="notice-pager" aria-label="공지사항 페이지"></nav>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> My Blog · 마크다운으로 작성</p>
    </div>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
  <script src="js/config.js"></script>
  <script src="js/announcements.js"></script>
</body>
</html>
